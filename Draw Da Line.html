<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Draw the Line</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; overflow: hidden;
    font-family: 'Segoe UI', sans-serif; touch-action: none;
  }
  canvas { display: block; max-width: 100vw; max-height: 100vh; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
//  DRAW THE LINE  –  Full Playable Prototype
//  Systems: Physics (Matter.js), Line Drawing → Colliders,
//  Spike detection, Particle FX, Endless world gen, HUD
// ─────────────────────────────────────────────────────────────
const { Engine, Bodies, Body, World } = Matter;

// ── Canvas & scaling ────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 400, H = 700;
canvas.width = W; canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width  = (W*s)+'px';
  canvas.style.height = (H*s)+'px';
}
resize(); window.addEventListener('resize', resize);

// ── Physics world ────────────────────────────────────────────
const engine = Engine.create({ gravity:{y:2.0} });
const world  = engine.world;

// ── Game state ───────────────────────────────────────────────
const S = { START:0, PLAY:1, DEAD:2 };
let state=S.START, score=0, highScore=0, cameraX=0;
let ball=null; const BR=18;  // ball radius
let drawPts=[];              // live stroke (world coords)
let lines=[];                // committed line groups {bodies,pts}
let spikes=[];               // {x,y,size,onFloor}
let parts=[];                // particles
let worldW=0;
const FY = H-65;             // floor Y

// ── Coord helpers ────────────────────────────────────────────
const w2s=(wx,wy)=>({x:wx-cameraX, y:wy});
const s2w=(sx,sy)=>({x:sx+cameraX, y:sy});
const d=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);

// ── World generation ─────────────────────────────────────────
function genChunk(fx) {
  const cw=700;
  // Floor collider (static rectangle)
  World.add(world, Bodies.rectangle(fx+cw/2, FY+12, cw, 24, {
    isStatic:true, friction:0.8, label:'floor',
    collisionFilter:{category:0x0002,mask:0x0001}
  }));
  // Scatter spikes (skip first safe zone)
  if (fx>200) {
    let sx=fx+80;
    while (sx<fx+cw-60) {
      if (Math.random()>0.38) {
        spikes.push({
          x:sx, size:13+Math.random()*10,
          onFloor:Math.random()>0.30,
          y:Math.random()>0.30 ? FY : FY-90-Math.random()*130
        });
      }
      sx += 65+Math.random()*95;
    }
  }
  worldW = fx+cw;
}

// ── Ball ─────────────────────────────────────────────────────
function mkBall() {
  ball = Bodies.circle(100, FY-BR-5, BR, {
    restitution:0.22, friction:0.75, frictionAir:0.014,
    density:0.004, label:'ball',
    collisionFilter:{category:0x0001,mask:0x0002}
  });
  World.add(world, ball);
  Body.setVelocity(ball,{x:2.5,y:0});
}

// ── Ramer-Douglas-Peucker line simplification ────────────────
function rdp(pts,eps=2.5) {
  if(pts.length<=2)return pts;
  let mx=0,ix=0;
  const a=pts[0],b=pts[pts.length-1];
  const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy);
  for(let i=1;i<pts.length-1;i++){
    const dv=len<0.001?d(pts[i],a):Math.abs(dy*pts[i].x-dx*pts[i].y+b.x*a.y-b.y*a.x)/len;
    if(dv>mx){mx=dv;ix=i;}
  }
  if(mx>eps)return[...rdp(pts.slice(0,ix+1),eps).slice(0,-1),...rdp(pts.slice(ix),eps)];
  return[a,b];
}

// ── Convert drawn stroke into static physics segments ────────
function finalize() {
  if(drawPts.length<2){drawPts=[];return;}
  const pts=rdp(drawPts,2.5);
  const bodies=[];
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1],len=d(a,b);
    if(len<3)continue;
    const seg=Bodies.rectangle((a.x+b.x)/2,(a.y+b.y)/2,len,7,{
      isStatic:true, angle:Math.atan2(b.y-a.y,b.x-a.x),
      friction:0.75, restitution:0.1, label:'line',
      collisionFilter:{category:0x0002,mask:0x0001}
    });
    World.add(world,seg); bodies.push(seg);
  }
  lines.push({bodies,pts:[...pts]});
  // Limit memory — remove oldest line group
  if(lines.length>10) World.remove(world, lines.shift().bodies);
  drawPts=[];
}

// ── Spike collision check (AABB vs circle) ───────────────────
function chkSpikes() {
  if(!ball)return;
  const bx=ball.position.x,by=ball.position.y;
  for(const s of spikes)
    if(Math.abs(bx-s.x)<s.size*0.85&&Math.abs(by-s.y)<s.size*1.3){die();return;}
}
function chkFall(){if(ball&&ball.position.y>H+120)die();}

// ── Particle explosion ───────────────────────────────────────
function burst(x,y) {
  const C=['#5bf0c8','#00b894','#ffd32a','#ff4757','#fff'];
  for(let i=0;i<48;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*7;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3.5,
      life:1,decay:0.018+Math.random()*0.025,r:3+Math.random()*5,
      c:C[i%C.length]});
  }
}

// ── Death sequence ───────────────────────────────────────────
function die() {
  if(state!==S.PLAY)return;
  state=S.DEAD;
  if(ball){
    burst(w2s(ball.position.x,0).x, ball.position.y);
    World.remove(world,ball); ball=null;
  }
  if(score>highScore)highScore=score;
}

// ── Game init / restart ──────────────────────────────────────
function init() {
  World.clear(world); Engine.clear(engine);
  parts=[]; spikes=[]; lines=[]; drawPts=[];
  score=0; cameraX=0; worldW=0;
  genChunk(0); genChunk(700); genChunk(1400);
  mkBall(); state=S.PLAY;
}

// ── Input (touch + mouse) ────────────────────────────────────
let drawing=false;
function gp(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return s2w((t.clientX-r.left)*(W/r.width),(t.clientY-r.top)*(H/r.height));
}

const BTN={x:W/2-80,y:H/2+60,w:160,h:52};

function onDown(e){
  e.preventDefault&&e.preventDefault();
  if(state===S.START){init();return;}
  if(state===S.PLAY){drawing=true;drawPts=[gp(e)];}
}
function onMove(e){
  e.preventDefault&&e.preventDefault();
  if(!drawing||state!==S.PLAY)return;
  const p=gp(e),l=drawPts[drawPts.length-1];
  if(d(p,l)>4)drawPts.push(p);
}
function onUp(e){
  e.preventDefault&&e.preventDefault();
  if(drawing){drawing=false;finalize();}
  if(state===S.DEAD){
    const r=canvas.getBoundingClientRect();
    const t=e.changedTouches?e.changedTouches[0]:e;
    const mx=(t.clientX-r.left)*(W/r.width),my=(t.clientY-r.top)*(H/r.height);
    if(mx>=BTN.x&&mx<=BTN.x+BTN.w&&my>=BTN.y&&my<=BTN.y+BTN.h)init();
  }
}
['touchstart','mousedown'].forEach(ev=>canvas.addEventListener(ev,onDown,{passive:false}));
['touchmove','mousemove'].forEach(ev=>canvas.addEventListener(ev,onMove,{passive:false}));
['touchend','mouseup'].forEach(ev=>canvas.addEventListener(ev,onUp,{passive:false}));

// ── Draw helpers ─────────────────────────────────────────────
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── Render functions ─────────────────────────────────────────
function rBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#080818');g.addColorStop(0.6,'#11112e');g.addColorStop(1,'#190f38');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Parallax stars
  ctx.save();ctx.globalAlpha=0.55;
  for(let i=0;i<55;i++){
    const x=((i*137.5+Math.floor(cameraX*0.18))%W+W)%W;
    const y=(i*89+11)%(H*0.68);
    ctx.beginPath();ctx.arc(x,y,(i%3)*0.5+0.5,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
  }
  ctx.restore();
}

function rFloor(){
  const g=ctx.createLinearGradient(0,FY,0,H);
  g.addColorStop(0,'#2e2e6a');g.addColorStop(0.15,'#1a1a45');g.addColorStop(1,'#0a0a1e');
  ctx.fillStyle=g;ctx.fillRect(0,FY,W,H-FY);
  ctx.strokeStyle='#5050a8';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,FY);ctx.lineTo(W,FY);ctx.stroke();
}

function rSpikes(){
  for(const s of spikes){
    const sc=w2s(s.x,s.y);
    if(sc.x<-60||sc.x>W+60)continue;
    const sz=s.size;
    ctx.save();
    ctx.shadowColor='#ff4757';ctx.shadowBlur=14;
    const g=ctx.createLinearGradient(sc.x-sz,sc.y-sz*2,sc.x+sz,sc.y+sz);
    g.addColorStop(0,'#ff6b81');g.addColorStop(1,'#c0392b');
    ctx.fillStyle=g;ctx.strokeStyle='#ff4757';ctx.lineWidth=1.5;
    ctx.beginPath();
    if(s.onFloor){
      ctx.moveTo(sc.x,sc.y-sz*1.7);ctx.lineTo(sc.x-sz*0.65,sc.y);ctx.lineTo(sc.x+sz*0.65,sc.y);
    }else{
      ctx.moveTo(sc.x,sc.y+sz*1.7);ctx.lineTo(sc.x-sz*0.65,sc.y);ctx.lineTo(sc.x+sz*0.65,sc.y);
    }
    ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
  }
}

function rLines(){
  for(const lg of lines){
    if(lg.pts.length<2)continue;
    ctx.save();
    ctx.shadowColor='rgba(255,255,255,0.22)';ctx.shadowBlur=10;
    ctx.beginPath();
    const p0=w2s(lg.pts[0].x,lg.pts[0].y);ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<lg.pts.length;i++){
      const p=w2s(lg.pts[i].x,lg.pts[i].y);ctx.lineTo(p.x,p.y);
    }
    ctx.strokeStyle='#fff';ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    ctx.shadowBlur=0;ctx.strokeStyle='rgba(160,220,255,0.5)';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
  }
  if(drawPts.length>1){
    ctx.save();
    ctx.shadowColor='rgba(80,255,170,0.5)';ctx.shadowBlur=12;
    ctx.beginPath();
    const p0=w2s(drawPts[0].x,drawPts[0].y);ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<drawPts.length;i++){
      const p=w2s(drawPts[i].x,drawPts[i].y);ctx.lineTo(p.x,p.y);
    }
    ctx.strokeStyle='rgba(100,255,190,0.9)';ctx.lineWidth=4;
    ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();ctx.restore();
  }
}

function rBall(){
  if(!ball)return;
  const sc=w2s(ball.position.x,ball.position.y),r=BR;
  ctx.save();
  // Glow halo
  const g0=ctx.createRadialGradient(sc.x,sc.y,r*0.3,sc.x,sc.y,r*2.4);
  g0.addColorStop(0,'rgba(91,240,200,0.28)');g0.addColorStop(1,'rgba(91,240,200,0)');
  ctx.beginPath();ctx.arc(sc.x,sc.y,r*2.4,0,Math.PI*2);ctx.fillStyle=g0;ctx.fill();
  // Drop shadow
  ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=12;ctx.shadowOffsetY=5;
  // Ball gradient
  const gb=ctx.createRadialGradient(sc.x-r*0.3,sc.y-r*0.3,r*0.05,sc.x,sc.y,r);
  gb.addColorStop(0,'#adf7e0');gb.addColorStop(0.5,'#5bf0c8');gb.addColorStop(1,'#00a87e');
  ctx.beginPath();ctx.arc(sc.x,sc.y,r,0,Math.PI*2);ctx.fillStyle=gb;ctx.fill();
  // Specular highlight
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  ctx.beginPath();ctx.arc(sc.x-r*0.28,sc.y-r*0.3,r*0.27,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.fill();
  // Spin indicator
  ctx.translate(sc.x,sc.y);ctx.rotate(ball.angle);
  ctx.strokeStyle='rgba(0,80,50,0.4)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(r*0.75,0);ctx.stroke();
  ctx.restore();
}

function rParts(){
  for(const p of parts){
    ctx.save();ctx.globalAlpha=p.life;
    ctx.shadowColor=p.c;ctx.shadowBlur=9;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.c;ctx.fill();ctx.restore();
  }
}

function rHUD(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.38)';rr(W/2-65,14,130,38,19);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 20px "Segoe UI",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#5bf0c8';ctx.shadowBlur=8;
  ctx.fillText(Math.floor(score)+'m',W/2,33);ctx.restore();
}

function rStart(){
  ctx.save();
  ctx.fillStyle='rgba(5,5,25,0.86)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#5bf0c8';ctx.shadowBlur=40;
  ctx.fillStyle='#fff';ctx.font='bold 54px "Segoe UI",sans-serif';
  ctx.fillText('DRAW',W/2,H/2-90);
  ctx.font='bold 30px "Segoe UI",sans-serif';ctx.fillStyle='#5bf0c8';ctx.shadowBlur=18;
  ctx.fillText('THE LINE',W/2,H/2-40);
  ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.62)';ctx.font='15px "Segoe UI",sans-serif';
  ctx.fillText('Draw a path to guide the ball forward',W/2,H/2+25);
  ctx.fillText('Avoid red spikes — don\'t fall!',W/2,H/2+50);
  const p=0.55+0.45*Math.sin(Date.now()/380);
  ctx.globalAlpha=p;ctx.fillStyle='#5bf0c8';ctx.font='bold 17px "Segoe UI",sans-serif';
  ctx.shadowColor='#5bf0c8';ctx.shadowBlur=14;ctx.fillText('▶  TAP TO START',W/2,H/2+112);
  ctx.restore();
}

function rDead(){
  ctx.save();
  ctx.fillStyle='rgba(5,5,25,0.9)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#ff4757';ctx.shadowBlur=35;
  ctx.fillStyle='#fff';ctx.font='bold 46px "Segoe UI",sans-serif';
  ctx.fillText('GAME OVER',W/2,H/2-95);
  ctx.shadowColor='#5bf0c8';ctx.shadowBlur=10;
  ctx.fillStyle='rgba(255,255,255,0.88)';ctx.font='22px "Segoe UI",sans-serif';
  ctx.fillText('Distance: '+Math.floor(score)+'m',W/2,H/2-28);
  ctx.fillStyle='#ffd32a';ctx.font='17px "Segoe UI",sans-serif';
  ctx.fillText('Best: '+Math.floor(highScore)+'m',W/2,H/2+8);
  // Restart button
  const{x,y,w,h}=BTN;
  ctx.shadowColor='#5bf0c8';ctx.shadowBlur=22;
  const bg=ctx.createLinearGradient(x,y,x,y+h);
  bg.addColorStop(0,'#5bf0c8');bg.addColorStop(1,'#00b894');
  ctx.fillStyle=bg;rr(x,y,w,h,26);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='#082e22';ctx.font='bold 20px "Segoe UI",sans-serif';
  ctx.fillText('PLAY AGAIN',W/2,y+h/2);
  ctx.restore();
}

// ── Main loop ────────────────────────────────────────────────
let lt=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lt)/1000,0.05); lt=ts;

  if(state===S.PLAY){
    Engine.update(engine,dt*1000);
    if(ball){
      // Maintain forward speed
      const vx=ball.velocity.x;
      if(vx<4)  Body.applyForce(ball,ball.position,{x:0.00065,y:0});
      if(vx>8.5)Body.applyForce(ball,ball.position,{x:-0.0004,y:0});
      // Smooth camera follow
      cameraX+=(ball.position.x-W*0.32-cameraX)*0.1;
      score=ball.position.x/60;
      // Extend world ahead
      if(ball.position.x+1200>worldW)genChunk(worldW);
      chkSpikes(); chkFall();
    }
    // Particle physics
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=p.decay;});
    parts=parts.filter(p=>p.life>0);
  }

  // Render
  ctx.clearRect(0,0,W,H);
  rBG(); rFloor(); rSpikes(); rLines(); rBall(); rParts();
  if(state===S.PLAY)rHUD();
  if(state===S.START)rStart();
  if(state===S.DEAD){rParts();rDead();}
}
requestAnimationFrame(loop);
</script>
</body>
</html>
